# ── OpenCS CI Pipeline ──────────────────────────────────────────
# Runs tests + coverage for all packages, including E2E tests.
# Triggered on push to main and pull requests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    name: 🧪 Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── Node & Cache ──────────────────────────────────────
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # ── Native Dependencies ───────────────────────────────
      # better-sqlite3 needs build-essential and python3
      - name: 🔨 Install native build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential python3

      # ── Install ───────────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── TypeScript Build ──────────────────────────────────
      - name: 🏗️ Build all packages
        run: npm run build --workspaces

      # ── Lint ──────────────────────────────────────────────
      - name: 🔍 Lint
        run: npm run lint 2>&1 || echo 'Lint warnings ignored for now'

      # ── Tests + Coverage ──────────────────────────────────
      # Single run: tests once, get coverage + verbose output together
      - name: 🧪 Run all tests with coverage (including E2E)
        id: tests
        working-directory: packages/core
        run: |
          set -o pipefail
          npx vitest run --coverage \
            --reporter=verbose \
            --coverage.reporter=text \
            --coverage.reporter=lcov \
            --coverage.reporter=clover 2>&1 | tee /tmp/vitest-output.txt
        env:
          NODE_ENV: test

      # ── Upload Coverage ───────────────────────────────────
      - name: ☁️ Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: packages/core/coverage/
          retention-days: 7
          if-no-files-found: warn

      # ── Coverage Summary (PR comment) ─────────────────────
      - name: 📋 Generate coverage summary
        if: ${{ !cancelled() }}
        run: |
          echo "## 📊 Test Coverage — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 30 'Coverage report' /tmp/vitest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Quick Check (fast feedback for PRs) ──────────────────────
  quick-check:
    name: ⚡ Quick check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔨 Install native build tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build --workspaces

      - name: ⚡ Quick test (unit-only, no E2E)
        working-directory: packages/core
        run: npx vitest run --reporter=verbose src/scheduler.test.ts src/transcriber.test.ts src/event-bus.test.ts
        env:
          NODE_ENV: test
