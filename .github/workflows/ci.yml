# ── WAGENT CI Pipeline ──────────────────────────────────────────
# Runs tests + coverage for all packages, including E2E tests under Bun.
# Triggered on push to main and pull requests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Bun Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── Setup Bun ─────────────────────────────────────────
      - name: 🔧 Setup Bun
        uses: actions/setup-bun@v2
        with:
          bun-version: latest

      # ── Install ───────────────────────────────────────────
      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      # ── Build ─────────────────────────────────────────────
      - name: 🏗️ Build all packages
        run: bun run build

      # ── Tests + Coverage ──────────────────────────────────
      - name: 🧪 Run all tests with coverage (including E2E)
        id: tests
        working-directory: packages/core
        run: |
          set -o pipefail
          bun --bun x vitest run --coverage \
            --reporter=verbose \
            --coverage.reporter=text \
            --coverage.reporter=lcov \
            --coverage.reporter=clover 2>&1 | tee /tmp/vitest-output.txt
        env:
          NODE_ENV: test

      # ── Upload Coverage ───────────────────────────────────
      - name: ☁️ Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bun
          path: packages/core/coverage/
          retention-days: 7
          if-no-files-found: warn

      # ── Coverage Summary (PR comment) ─────────────────────
      - name: 📋 Generate coverage summary
        if: ${{ !cancelled() }}
        run: |
          echo "## 📊 Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 30 'Coverage report' /tmp/vitest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Quick Check (fast feedback for PRs) ──────────────────────
  quick-check:
    name: ⚡ Quick check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Bun
        uses: actions/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build
        run: bun run build

      - name: ⚡ Quick test (unit-only, no E2E)
        working-directory: packages/core
        run: bun --bun x vitest run --reporter=verbose src/scheduler.test.ts src/transcriber.test.ts src/event-bus.test.ts
        env:
          NODE_ENV: test
